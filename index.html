<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA World Cup 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── CURSOR ── -->
  <div id="cursor"><div id="cursor-dot"></div></div>

  <!-- ── TOP BAR ── -->
  <header class="topbar">
    <div class="topbar__left">
      <span class="topbar__wordmark">FIFA WC 2026</span>
    </div>
    <div class="topbar__center">
      <div class="live-badge">
        <span class="live-pip"></span>
        <span>Group Stage · Live</span>
      </div>
    </div>
    <div class="topbar__right">
      <span class="topbar__host">USA · CAN · MEX</span>
    </div>
  </header>

  <!-- ── SIDE NAV ── -->
  <nav class="sidenav">
    <button class="sidenav__dot active" data-section="hero"><span>Home</span></button>
    <button class="sidenav__dot" data-section="scores"><span>Scores</span></button>
    <button class="sidenav__dot" data-section="groups"><span>Groups</span></button>
    <button class="sidenav__dot" data-section="fixtures"><span>Fixtures</span></button>
  </nav>

  <!-- ── PAGE WRAPPER ── -->
  <div id="pageWrapper">

    <!-- ══ SECTION: HERO ══ -->
    <section id="hero" class="page active">
      <div class="parallax-layer" data-depth="0.1">
        <div class="hero-ghost">2026</div>
      </div>
      <div class="parallax-layer" data-depth="0.4">
        <div class="hero-rule-v"></div>
      </div>
      <div class="parallax-layer hero-content" data-depth="0.7">
        <p class="hero-kicker" data-anim="fade-up" data-delay="0">FIFA World Cup</p>
        <h1 class="hero-headline">
          <span class="hero-line" data-anim="clip-up" data-delay="100">The</span>
          <span class="hero-line hero-line--big" data-anim="clip-up" data-delay="200">World</span>
          <span class="hero-line hero-line--italic" data-anim="clip-up" data-delay="300">Plays.</span>
        </h1>
        <div class="hero-stats" data-anim="fade-up" data-delay="500">
          <div class="hero-stat">
            <span class="hero-stat__num" data-countup="48">0</span>
            <span class="hero-stat__label">Nations</span>
          </div>
          <div class="hero-stat__sep"></div>
          <div class="hero-stat">
            <span class="hero-stat__num" data-countup="12">0</span>
            <span class="hero-stat__label">Groups</span>
          </div>
          <div class="hero-stat__sep"></div>
          <div class="hero-stat">
            <span class="hero-stat__num" data-countup="104">0</span>
            <span class="hero-stat__label">Matches</span>
          </div>
          <div class="hero-stat__sep"></div>
          <div class="hero-stat">
            <span class="hero-stat__num" data-countup="16">0</span>
            <span class="hero-stat__label">Venues</span>
          </div>
        </div>
        <button class="hero-cta" data-anim="fade-up" data-delay="700" data-goto="scores">
          <span>View Scores</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="hero-scroll-hint" data-anim="fade-up" data-delay="900">
        <span>Scroll</span>
        <div class="hero-scroll-line"></div>
      </div>
    </section>

    <!-- ══ SECTION: SCORES ══ -->
    <section id="scores" class="page">
      <div class="page-inner">
        <div class="page-header">
          <div class="page-label" data-anim="fade-right" data-delay="0">Match Results</div>
          <h2 class="page-title" data-anim="clip-up" data-delay="100">
            Recent<br/><em>Scores</em>
          </h2>
          <p class="page-sub" data-anim="fade-up" data-delay="200">Tap any card to see details</p>
        </div>
        <div class="scores-grid" id="scoresGrid"></div>
      </div>
    </section>

    <!-- ══ SECTION: GROUPS ══ -->
    <section id="groups" class="page">
      <div class="page-inner">
        <div class="page-header">
          <div class="page-label" data-anim="fade-right" data-delay="0">Group Stage</div>
          <h2 class="page-title" data-anim="clip-up" data-delay="100">
            Standing<br/><em>Tables</em>
          </h2>
        </div>
        <div class="group-tabs" id="groupTabs" data-anim="fade-up" data-delay="200"></div>
        <div class="group-panel-wrap">
          <div class="group-panel" id="groupPanel"></div>
        </div>
      </div>
    </section>

    <!-- ══ SECTION: FIXTURES ══ -->
    <section id="fixtures" class="page">
      <div class="page-inner">
        <div class="page-header">
          <div class="page-label" data-anim="fade-right" data-delay="0">Coming Up</div>
          <h2 class="page-title" data-anim="clip-up" data-delay="100">
            Upcoming<br/><em>Fixtures</em>
          </h2>
        </div>
        <div class="fixtures-list" id="fixturesList"></div>
      </div>
    </section>

  </div><!-- /pageWrapper -->

  <!-- ── TRANSITION OVERLAY ── -->
  <div id="transitionOverlay">
    <div class="overlay-block overlay-block--left"></div>
    <div class="overlay-block overlay-block--right"></div>
  </div>

  <!-- ── SCRIPTS (order matters) ── -->
  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/parallax.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
